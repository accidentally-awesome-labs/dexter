# Full staging stack: Coolify (local compose + Linux overrides) + Dexter bridge + optional Caddy TLS.
#
#   cd infra/coolify/staging && cp .env.example .env
#   # Edit .env (Coolify APP_KEY from panel bootstrap, tokens, STAGING_DOMAIN)
#   docker compose -f docker-compose.full.yml up -d
#   docker compose -f docker-compose.full.yml --profile tls up -d   # enable HTTPS
#
include:
  - path: ../local/docker-compose.yml
  - path: ./coolify.linux.yml

services:
  dexter-bridge:
    image: node:22-bookworm-slim
    container_name: dexter-bridge
    working_dir: /app
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEXTER_BRIDGE_HOST: "0.0.0.0"
      DEXTER_BRIDGE_PORT: "${DEXTER_BRIDGE_PORT:-9876}"
      COOLIFY_ORIGIN: "http://127.0.0.1:${APP_PORT:-8001}"
    volumes:
      - ../../..:/app
      - ../apps.json:/app/infra/coolify/apps.json:ro
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        npm ci
        exec npm run coolify:bridge
    depends_on:
      coolify:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: dexter-staging-caddy
    restart: unless-stopped
    network_mode: host
    profiles:
      - tls
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
