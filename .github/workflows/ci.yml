name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fresh-state gate (detached worktree)
        run: |
          set -euo pipefail
          fresh_dir="$(mktemp -d)"
          git worktree add --detach "${fresh_dir}" HEAD
          cleanup() {
            git worktree remove --force "${fresh_dir}" || true
          }
          trap cleanup EXIT
          cd "${fresh_dir}"
          npm ci
          npm run typecheck
          npm run test:unit
          npm run run:sample
          npm run benchmark:backend
          npm run soak:cycle -- --target-streak 1 --enforce-gate false
          npm exec tsx src/index.ts verify
      - name: Typecheck
        run: npm run typecheck
      - name: Run sample pipeline
        run: npm run run:sample
      - name: Run benchmark harness
        run: npm run benchmark
      - name: Run backend benchmark harness
        run: npm run benchmark:backend
      - name: Generate readiness report
        run: npm run readiness:report
      - name: Verify provenance gate
        run: npm run provenance:verify
      - name: Verify attestation gate
        run: npm run attest:verify
      - name: Run trust gates failure-injection drill
        run: npm run trust:gates
      - name: Run local API-mode deploy drill
        run: npm run deploy:drill:api:local
      - name: Record soak cycle status
        run: npm run soak:cycle -- --target-streak 1 --enforce-gate false
      - name: Evaluate release decision gates
        run: npm run release:decision
      - name: Verify readiness
        run: npm test
