name: registry-publish

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Registry prefix (default ghcr.io/org)
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build and push smoke image
        env:
          DEXTER_REGISTRY: ${{ inputs.registry || format('ghcr.io/{0}', github.repository_owner) }}
        run: npm run registry:publish-drill
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: registry-publish-drill
          path: |
            artifacts/release/REGISTRY_PUBLISH_DRILL.json
            runs/*/deploy_publish.json
          if-no-files-found: ignore
